
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TrustKey CRM</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TrustKey">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="description" content="TrustKey Locksmith CRM - Manage jobs, calls, and technicians">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Auto-update: detect a new deploy and reload to pick it up — but only while the tab
      // is in the background, so a tech/manager is never interrupted mid-action. No manual
      // hard-refresh needed.
      (function () {
        let pending = false;
        let baselineHtml = null;

        const applyWhenIdle = () => {
          if (pending && document.hidden) window.location.reload();
        };
        document.addEventListener('visibilitychange', applyWhenIdle);

        async function checkVersion() {
          try {
            const html = await (await fetch('/', { cache: 'no-store' })).text();
            if (baselineHtml === null) { baselineHtml = html; return; }
            if (html !== baselineHtml) { pending = true; applyWhenIdle(); }
          } catch (e) { /* offline — try again next tick */ }
        }

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => {
                console.log('SW registered:', reg.scope);
                setInterval(() => reg.update().catch(() => {}), 60000);
              })
              .catch(err => console.warn('SW registration failed:', err));
          });
          // A new service worker taking control means new assets are ready.
          navigator.serviceWorker.addEventListener('controllerchange', () => { pending = true; applyWhenIdle(); });
        }

        // Poll the built index.html for asset changes (covers deploys without an SW change).
        setInterval(checkVersion, 120000);
        window.addEventListener('load', checkVersion);
      })();
    </script>
</body>
</html>
